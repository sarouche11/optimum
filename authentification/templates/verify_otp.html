{% load static %}
<!DOCTYPE html>
<html dir="ltr">

{% include 'partials/head.html' %}

<body style="background-color: #f6f9ff;">
    <div class="main-wrapper">
        <!-- ============================================================== -->
        <!-- Preloader - style you can find in spinners.css -->
        <!-- ============================================================== -->
        <div class="preloader">
            <div class="lds-ripple">
                <div class="lds-pos"></div>
                <div class="lds-pos"></div>
            </div>
        </div>
        <!-- ============================================================== -->
        <!-- Preloader - style you can find in spinners.css -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Login box.scss -->
        <!-- ============================================================== -->
        <div class="auth-wrapper d-flex no-block justify-content-center align-items-center">
             {% include 'partials/messages.html' %}
            <div class="auth-box">
                <div id="loginform">
                    <div class="logo">
                        <span class="db"><img src="{% static 'assets/images/logom.png' %}" alt="logo"
                                style="width: 100px; height: 10²0px; margin-bottom: 30px;" /></span>
                     
                        <h6 class=" m-b-20">Enter your confirmation code </h6>
                    </div>
                    <!-- Form -->
                    <div class="row">
                        <div class="col-12">
                            <form class="form-horizontal m-t-20" id="loginform" method="POST">
                                {% csrf_token %}

                                 {% if profile.use_2fa_email %}
                                <div class="form-group mb-3">
                                    <label>Confirmation code </label>

                                    <div class="input-group mb-3">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="basic-addon1">
                                                <i class="bi bi-envelope-check-fill text-success me-1"></i>
                                            </span>
                                        </div>

                                        <input type="text" class="form-control" name="otp" placeholder="confirmation code"
                                            aria-describedby="basic-addon1" required>
                                      
                                    </div>


                                </div>
                                {% endif %}


                                 {% if profile.use_2fa_totp %}
                                <div class="form-group mb-3">
                                    <label>Google Authentificator</label>

                                    <div class="input-group mb-3">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="basic-addon1">
                                                <i class="bi bi-shield-lock-fill text-success me-1"></i>
                                            </span>
                                        </div>

                                        <input type="text" class="form-control" name="totp_code" placeholder="confirmation code"
                                            aria-describedby="basic-addon1" required>
                                      
                                    </div>


                                </div>
                                {% endif %}

                            

                                <div class="form-group text-center">
                                    <div class="col-xs-12 p-b-20">
                                        <button class="btn btn-block-login btn-login" type="submit">Confirm</button>
                                    </div>
                                </div>


                            
                            </form>
                        </div>

                    </div>
                </div>


            </div>
        </div>

        <div class="text-center mt-3">
            <div > &copy; Copyright <strong><span><a style="color: #962F2F;"
                            href="#">digideel</a></span></strong>. All Rights Reserved </div>
        </div>

        <!-- ============================================================== -->
        <!-- Login box.scss -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Page wrapper scss in scafholding.scss -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Page wrapper scss in scafholding.scss -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Right Sidebar -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Right Sidebar -->
        <!-- ============================================================== -->
    </div>
    <!-- ============================================================== -->
    <!-- All Required js -->
    <!-- ============================================================== -->
    <script src="{% static 'assets/libs/jquery/dist/jquery.min.js' %}"></script>
    <!-- Bootstrap tether Core JavaScript -->
    <script src="{% static 'assets/libs/popper.js/dist/umd/popper.min.js' %}"></script>
    <script src="{% static 'assets/libs/bootstrap/dist/js/bootstrap.min.js' %}"></script>
    <!-- ============================================================== -->
    <!-- This page plugin js -->
    <!-- ============================================================== -->
    <script>
        $('[data-toggle="tooltip"]').tooltip();
        $(".preloader").fadeOut();
        // ============================================================== 
        // Login and Recover Password 
        // ============================================================== 
        $('#to-recover').on("click", function () {
            $("#loginform").slideUp();
            $("#recoverform").fadeIn();
        });
    </script>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html dir="ltr">

{% include 'partials/head.html' %}

<body style="background-color: #f6f9ff;">
    <div class="main-wrapper">
        <!-- ============================================================== -->
        <!-- Preloader - style you can find in spinners.css -->
        <!-- ============================================================== -->
        <div class="preloader">
            <div class="lds-ripple">
                <div class="lds-pos"></div>
                <div class="lds-pos"></div>
            </div>
        </div>
        <!-- ============================================================== -->
        <!-- Preloader - style you can find in spinners.css -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Login box.scss -->
        <!-- ============================================================== -->
        <div class="auth-wrapper d-flex no-block justify-content-center align-items-center">
            <div class="auth-box">
                <div id="loginform">
                    <div class="logo">
                        <span class="db"><img src="{% static 'assets/images/logoB.png' %}" alt="logo"
                                style="width: 160px; height: 100px; margin-bottom: 30px;" /></span>
                        <h3 class="font-medium m-b-20" style="color: #941313;">Login </h3>
                        <h6 class=" m-b-20">Enter your username & password to login </h6>
                    </div>
                    <!-- Form -->
                    <div class="row">
                        <div class="col-12">
                            <form class="form-horizontal m-t-20" id="loginform" action="{% url 'login' %}" method="POST">
                                {% include 'partials/messages.html' %}
                                {% csrf_token %}
                                <div class="form-group mb-3">
                                    <label>Email / Username </label>

                                    <div class="input-group mb-3">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="basic-addon1">
                                                <i class="ti-email"></i>
                                            </span>
                                        </div>

                                        <input type="text" class="form-control" name="username" placeholder="Username or Email"
                                            aria-describedby="basic-addon1">
                                      
                                    </div>


                                </div>

                                <div class="form-group mb-3">
                                    <label> Password </label>

                                    <div class="input-group">

                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="basic-addon2"><i
                                                    class="ti-lock"></i></span>
                                        </div>
                                        <input type="password" class="form-control" name="password" placeholder="Password"
                                            aria-describedby="basic-addon1">
                                    </div>
                                </div>


                                <div class="form-group mb-3 captcha-block">
                                    <label class="form-label d-block arb"
                                        style="font-size: 15px;  ">Enter the verification code shown in the image
                                        </label>
                                    {{ captchaForm.captcha }}
                                </div>



                                <div class="form-group text-center">
                                    <div class="col-xs-12 p-b-20">
                                        <button class="btn btn-block-login btn-login" type="submit">Log In</button>
                                    </div>
                                </div>


                                <div class="form-group m-b-0 m-t-10">
                                    <div class="col-sm-12 text-center">
                                        Don't have an account? <a href="{% url 'register' %}"
                                            style="color: #941313; font-weight: bold;" class=" m-l-5">Register</a>

                                    </div>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>


            </div>
        </div>

        <div class="text-center mt-3">
            <div > &copy; Copyright <strong><span><a style="color: #941313;"
                            href="#">digideel</a></span></strong>. All Rights Reserved </div>
        </div>

        <!-- ============================================================== -->
        <!-- Login box.scss -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Page wrapper scss in scafholding.scss -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Page wrapper scss in scafholding.scss -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Right Sidebar -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Right Sidebar -->
        <!-- ============================================================== -->
    </div>
    <!-- ============================================================== -->
    <!-- All Required js -->
    <!-- ============================================================== -->
    <script src="{% static 'assets/libs/jquery/dist/jquery.min.js' %}"></script>
    <!-- Bootstrap tether Core JavaScript -->
    <script src="{% static 'assets/libs/popper.js/dist/umd/popper.min.js' %}"></script>
    <script src="{% static 'assets/libs/bootstrap/dist/js/bootstrap.min.js' %}"></script>
    <!-- ============================================================== -->
    <!-- This page plugin js -->
    <!-- ============================================================== -->
    <script>
        $('[data-toggle="tooltip"]').tooltip();
        $(".preloader").fadeOut();
        // ============================================================== 
        // Login and Recover Password 
        // ============================================================== 
        $('#to-recover').on("click", function () {
            $("#loginform").slideUp();
            $("#recoverform").fadeIn();
        });
    </script>
</body>

</html>
